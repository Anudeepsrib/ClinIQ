replicaCount: 2

image:
  repository: your-acr-name.azurecr.io/cliniq
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  name: "cliniq-sa"

podAnnotations: {}
podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: "nginx" # Adjust for Azure App Gateway if using AGIC
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: api.cliniq.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: cliniq-tls
      hosts:
        - api.cliniq.example.com

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

env:
  ENVIRONMENT: "production"
  PYTHON_VERSION: "3.11.0"
  CHROMA_PERSIST_DIRECTORY: "/app/data/vector_db"
  CORS_ALLOWED_ORIGINS: "https://api.cliniq.example.com"
  CORS_ALLOW_CREDENTIALS: "true"
  ENABLE_EXTERNAL_TRACING: "false"
  LANGCHAIN_TRACING_V2: "false"
  LLM_PROVIDER: "google_gemma"
  LLM_MODEL: "gemma-4-26b-a4b-it"
  GOOGLE_GEMMA_MODEL: "gemma-4-26b-a4b-it"
  OPENAI_LLM_MODEL: "gpt-4o"
  GEMMA_THINKING_LEVEL: "high"
  AZURE_SEARCH_ENABLED: "false"
  CHAT_HISTORY_ENABLED: "false"

secrets:
  # Production deployments should provide this Secret out of band, for example
  # with Azure Key Vault CSI Driver, External Secrets Operator, or sealed-secrets.
  create: false
  existingSecret: ""

volumeMounts:
  - name: cliniq-data
    mountPath: /app/data
  - name: cliniq-tmp
    mountPath: /tmp

volumes:
  - name: cliniq-data
    emptyDir: {} # For enterprise, replace with PersistentVolumeClaim pointing to Azure Disks or Azure Files
  - name: cliniq-tmp
    emptyDir: {}
