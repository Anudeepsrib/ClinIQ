{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cliniq.fullname" . }}-secret
  labels:
    {{- include "cliniq.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Set these with --set-string, a private values file, or replace this chart
  # Secret with Azure Key Vault CSI / External Secrets Operator in production.
  OPENAI_API_KEY: {{ required "secrets.openaiApiKey is required when secrets.create=true" .Values.secrets.openaiApiKey | quote }}
  JWT_SECRET_KEY: {{ required "secrets.jwtSecretKey is required when secrets.create=true" .Values.secrets.jwtSecretKey | quote }}
  GOOGLE_API_KEY: {{ default "" .Values.secrets.googleApiKey | quote }}
  AZURE_SEARCH_API_KEY: {{ default "" .Values.secrets.azureSearchApiKey | quote }}
  LANGCHAIN_API_KEY: {{ default "" .Values.secrets.langchainApiKey | quote }}
{{- end }}
